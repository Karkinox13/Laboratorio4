<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a2a3a"/>
    </linearGradient>
    <linearGradient id="leatherCase" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5c3317"/>
      <stop offset="50%" style="stop-color:#4a2810"/>
      <stop offset="100%" style="stop-color:#3a1e08"/>
    </linearGradient>
    <linearGradient id="caseInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a5c"/>
      <stop offset="100%" style="stop-color:#0d2a45"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" fill="url(#bg3)"/>

  <!-- Leather Harmonica Case -->
  <g transform="translate(60, 60)">
    <!-- Case exterior -->
    <rect x="0" y="0" width="280" height="130" rx="10" fill="url(#leatherCase)"/>
    <!-- Stitching -->
    <rect x="8" y="8" width="264" height="114" rx="8" fill="none" stroke="#8B5e3c" stroke-width="2" stroke-dasharray="8,4"/>
    <!-- Clasp -->
    <rect x="120" y="120" width="40" height="14" rx="5" fill="#d4a017"/>
    <rect x="130" y="123" width="20" height="8" rx="3" fill="#b8860b"/>
    <!-- Seam line -->
    <line x1="0" y1="65" x2="280" y2="65" stroke="#3a1e08" stroke-width="2.5"/>
    <!-- Label -->
    <text x="140" y="42" font-size="11" fill="#d4a017" font-family="Georgia, serif" text-anchor="middle" font-weight="bold">HARMONICA HUB</text>
    <text x="140" y="58" font-size="8" fill="#c8a060" font-family="Arial" text-anchor="middle" letter-spacing="3">GENUINE LEATHER CASE</text>

    <!-- Open half showing harmonica inside -->
    <rect x="0" y="65" width="280" height="65" rx="0" fill="url(#leatherCase)"/>
    <rect x="8" y="70" width="264" height="55" rx="5" fill="url(#caseInner)"/>
    <!-- Harmonica inside case -->
    <rect x="20" y="83" width="240" height="12" rx="4" fill="#c0c0c0"/>
    <rect x="20" y="95" width="240" height="22" rx="0" fill="#b0b0b0"/>
    <g fill="#444" opacity="0.7">
      <rect x="28" y="98" width="14" height="8" rx="1"/>
      <rect x="48" y="98" width="14" height="8" rx="1"/>
      <rect x="68" y="98" width="14" height="8" rx="1"/>
      <rect x="88" y="98" width="14" height="8" rx="1"/>
      <rect x="108" y="98" width="14" height="8" rx="1"/>
      <rect x="128" y="98" width="14" height="8" rx="1"/>
      <rect x="148" y="98" width="14" height="8" rx="1"/>
      <rect x="168" y="98" width="14" height="8" rx="1"/>
      <rect x="188" y="98" width="14" height="8" rx="1"/>
      <rect x="208" y="98" width="14" height="8" rx="1"/>
    </g>
    <rect x="20" y="117" width="240" height="12" rx="4" fill="#c0c0c0"/>
    
    <text x="140" y="157" font-size="11" fill="#d4a017" font-family="Arial" text-anchor="middle" letter-spacing="2">DELUXE PROTECTIVE CASE</text>
  </g>

  <!-- Microphone/Amp setup on right -->
  <g transform="translate(390, 50)">
    <!-- Bullet mic for harmonica -->
    <ellipse cx="65" cy="25" rx="60" ry="22" fill="#555" stroke="#777" stroke-width="2"/>
    <ellipse cx="65" cy="25" rx="55" ry="18" fill="#444"/>
    <!-- Mesh pattern -->
    <g stroke="#666" stroke-width="0.8" opacity="0.7">
      <line x1="20" y1="10" x2="20" y2="40"/>
      <line x1="35" y1="8" x2="35" y2="42"/>
      <line x1="50" y1="7" x2="50" y2="43"/>
      <line x1="65" y1="7" x2="65" y2="43"/>
      <line x1="80" y1="7" x2="80" y2="43"/>
      <line x1="95" y1="8" x2="95" y2="42"/>
      <line x1="110" y1="10" x2="110" y2="40"/>
      <line x1="10" y1="20" x2="120" y2="20"/>
      <line x1="8" y1="28" x2="122" y2="28"/>
    </g>
    <!-- Mic body/handle -->
    <rect x="50" y="45" width="30" height="80" rx="8" fill="#666" stroke="#888" stroke-width="1.5"/>
    <rect x="55" y="50" width="20" height="5" rx="2" fill="#555"/>
    <!-- Switch -->
    <rect x="57" y="80" width="16" height="8" rx="3" fill="#333"/>
    <rect x="57" y="80" width="8" height="8" rx="3" fill="#d4a017"/>
    <!-- Cable -->
    <path d="M65 125 Q65 145 50 160 Q35 175 40 200" stroke="#333" stroke-width="4" fill="none" stroke-linecap="round"/>
    
    <text x="65" y="160" font-size="9" fill="#7eb8d4" font-family="Arial" text-anchor="middle" letter-spacing="2">BULLET MIC</text>
  </g>

  <!-- Cleaning kit -->
  <g transform="translate(540, 220)">
    <!-- Small container -->
    <rect x="0" y="0" width="80" height="50" rx="6" fill="#1a3a5c" stroke="#7eb8d4" stroke-width="1.5"/>
    <text x="40" y="20" font-size="8" fill="#7eb8d4" font-family="Arial" text-anchor="middle">CLEANING</text>
    <text x="40" y="32" font-size="8" fill="#7eb8d4" font-family="Arial" text-anchor="middle">KIT</text>
    <text x="40" y="44" font-size="7" fill="#d4a017" font-family="Arial" text-anchor="middle">✦ PRO ✦</text>
    <text x="40" y="70" font-size="9" fill="#7eb8d4" font-family="Arial" text-anchor="middle">Accessories</text>
  </g>

  <!-- Title text -->
  <text x="350" y="350" font-size="18" fill="white" font-family="Georgia, serif" text-anchor="middle">Accessories &amp; Gear</text>
  <line x1="200" y1="365" x2="500" y2="365" stroke="#d4a017" stroke-width="1.5" opacity="0.6"/>
  <text x="350" y="390" font-size="12" fill="#7eb8d4" font-family="Arial" text-anchor="middle" letter-spacing="2">CASES · MICS · CLEANING KITS · STANDS</text>

  <!-- Background decoration -->
  <text x="620" y="80" font-size="50" fill="#d4a017" opacity="0.08" font-family="serif">♬</text>
  <text x="30" y="380" font-size="40" fill="#7eb8d4" opacity="0.08" font-family="serif">♪</text>
</svg>
