<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#0a2540"/>
    </linearGradient>
    <linearGradient id="chrome2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8f8f8"/>
      <stop offset="30%" style="stop-color:#d0d0d0"/>
      <stop offset="70%" style="stop-color:#a8a8a8"/>
      <stop offset="100%" style="stop-color:#808080"/>
    </linearGradient>
    <linearGradient id="slideBtn" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e0e0e0"/>
      <stop offset="100%" style="stop-color:#aaa"/>
    </linearGradient>
  </defs>
  <rect width="700" height="420" fill="url(#bg2)"/>

  <!-- Chromatic Harmonica - large, center display -->
  <g transform="translate(60, 155)">
    <!-- Top cover -->
    <rect x="0" y="0" width="480" height="28" rx="7" fill="#7eb8d4"/>
    <!-- Main body -->
    <rect x="0" y="28" width="480" height="80" fill="url(#chrome2)"/>
    <!-- Bottom cover -->
    <rect x="0" y="108" width="480" height="28" rx="7" fill="#7eb8d4"/>
    
    <!-- Reed holes - top row -->
    <g fill="#1a1a1a" opacity="0.88">
      <rect x="12" y="36" width="24" height="16" rx="2"/>
      <rect x="43" y="36" width="24" height="16" rx="2"/>
      <rect x="74" y="36" width="24" height="16" rx="2"/>
      <rect x="105" y="36" width="24" height="16" rx="2"/>
      <rect x="136" y="36" width="24" height="16" rx="2"/>
      <rect x="167" y="36" width="24" height="16" rx="2"/>
      <rect x="198" y="36" width="24" height="16" rx="2"/>
      <rect x="229" y="36" width="24" height="16" rx="2"/>
      <rect x="260" y="36" width="24" height="16" rx="2"/>
      <rect x="291" y="36" width="24" height="16" rx="2"/>
      <rect x="322" y="36" width="24" height="16" rx="2"/>
      <rect x="353" y="36" width="24" height="16" rx="2"/>
      <rect x="384" y="36" width="24" height="16" rx="2"/>
      <rect x="415" y="36" width="24" height="16" rx="2"/>
    </g>
    <!-- Reed holes - bottom row -->
    <g fill="#1a1a1a" opacity="0.88">
      <rect x="12" y="56" width="24" height="28" rx="2"/>
      <rect x="43" y="56" width="24" height="28" rx="2"/>
      <rect x="74" y="56" width="24" height="28" rx="2"/>
      <rect x="105" y="56" width="24" height="28" rx="2"/>
      <rect x="136" y="56" width="24" height="28" rx="2"/>
      <rect x="167" y="56" width="24" height="28" rx="2"/>
      <rect x="198" y="56" width="24" height="28" rx="2"/>
      <rect x="229" y="56" width="24" height="28" rx="2"/>
      <rect x="260" y="56" width="24" height="28" rx="2"/>
      <rect x="291" y="56" width="24" height="28" rx="2"/>
      <rect x="322" y="56" width="24" height="28" rx="2"/>
      <rect x="353" y="56" width="24" height="28" rx="2"/>
      <rect x="384" y="56" width="24" height="28" rx="2"/>
      <rect x="415" y="56" width="24" height="28" rx="2"/>
    </g>
    <!-- Slide button on right -->
    <rect x="450" y="35" width="22" height="58" rx="5" fill="url(#slideBtn)" stroke="#777" stroke-width="1"/>
    <rect x="454" y="42" width="14" height="10" rx="2" fill="#666"/>
    <rect x="454" y="58" width="14" height="10" rx="2" fill="#666"/>
    <rect x="454" y="74" width="14" height="10" rx="2" fill="#666"/>
    
    <!-- Shine effect -->
    <rect x="0" y="28" width="480" height="10" fill="white" opacity="0.15" rx="0"/>
    
    <!-- Engraving text simulation -->
    <text x="240" y="98" font-size="9" fill="#666" font-family="Arial" text-anchor="middle" letter-spacing="4">CHROMATIC PRO • 16 HOLES • 4 OCTAVES</text>
    
    <text x="240" y="158" font-size="12" fill="#7eb8d4" font-family="Arial" text-anchor="middle" letter-spacing="4" font-weight="bold">CHROMATIC SERIES</text>
  </g>

  <!-- Features list on right -->
  <g transform="translate(560, 140)">
    <text x="0" y="0" font-size="15" fill="white" font-family="Georgia, serif">Features:</text>
    <line x1="0" y1="10" x2="120" y2="10" stroke="#d4a017" stroke-width="1.5"/>
    <text x="0" y="35" font-size="12" fill="#7eb8d4" font-family="Arial">✦ 16 holes</text>
    <text x="0" y="57" font-size="12" fill="#7eb8d4" font-family="Arial">✦ 4 octaves</text>
    <text x="0" y="79" font-size="12" fill="#7eb8d4" font-family="Arial">✦ Slide button</text>
    <text x="0" y="101" font-size="12" fill="#7eb8d4" font-family="Arial">✦ Chrome body</text>
    <text x="0" y="123" font-size="12" fill="#7eb8d4" font-family="Arial">✦ All keys</text>
  </g>

  <!-- Decorative notes -->
  <text x="570" y="360" font-size="70" fill="#d4a017" opacity="0.1" font-family="serif">♫</text>
  <text x="30" y="100" font-size="40" fill="#7eb8d4" opacity="0.1" font-family="serif">♬</text>
</svg>
