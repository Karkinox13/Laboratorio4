<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a"/>
      <stop offset="100%" style="stop-color:#1a3a5c"/>
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5c3317"/>
      <stop offset="50%" style="stop-color:#8B4513"/>
      <stop offset="100%" style="stop-color:#6b3a1f"/>
    </linearGradient>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0"/>
      <stop offset="50%" style="stop-color:#b0b0b0"/>
      <stop offset="100%" style="stop-color:#888"/>
    </linearGradient>
  </defs>

  <rect width="900" height="500" fill="url(#bg)"/>
  
  <!-- Decorative staff lines -->
  <g stroke="#7eb8d4" stroke-width="1" opacity="0.1">
    <line x1="0" y1="80" x2="900" y2="80"/>
    <line x1="0" y1="100" x2="900" y2="100"/>
    <line x1="0" y1="120" x2="900" y2="120"/>
    <line x1="0" y1="140" x2="900" y2="140"/>
    <line x1="0" y1="160" x2="900" y2="160"/>
  </g>

  <!-- Vintage harmonica collection display -->
  <!-- Harmonica 1 - Diatonic (horizontal) -->
  <g transform="translate(80, 180)">
    <rect x="0" y="0" width="350" height="20" rx="5" fill="#d4a017"/>
    <rect x="0" y="20" width="350" height="50" fill="url(#chrome)"/>
    <rect x="0" y="70" width="350" height="20" rx="5" fill="#d4a017"/>
    <g fill="#222" opacity="0.8">
      <rect x="15" y="27" width="20" height="17" rx="2"/>
      <rect x="42" y="27" width="20" height="17" rx="2"/>
      <rect x="69" y="27" width="20" height="17" rx="2"/>
      <rect x="96" y="27" width="20" height="17" rx="2"/>
      <rect x="123" y="27" width="20" height="17" rx="2"/>
      <rect x="150" y="27" width="20" height="17" rx="2"/>
      <rect x="177" y="27" width="20" height="17" rx="2"/>
      <rect x="204" y="27" width="20" height="17" rx="2"/>
      <rect x="231" y="27" width="20" height="17" rx="2"/>
      <rect x="258" y="27" width="20" height="17" rx="2"/>
      <rect x="285" y="27" width="20" height="17" rx="2"/>
      <rect x="312" y="27" width="20" height="17" rx="2"/>
    </g>
    <g fill="#222" opacity="0.8">
      <rect x="15" y="47" width="20" height="17" rx="2"/>
      <rect x="42" y="47" width="20" height="17" rx="2"/>
      <rect x="69" y="47" width="20" height="17" rx="2"/>
      <rect x="96" y="47" width="20" height="17" rx="2"/>
      <rect x="123" y="47" width="20" height="17" rx="2"/>
      <rect x="150" y="47" width="20" height="17" rx="2"/>
      <rect x="177" y="47" width="20" height="17" rx="2"/>
      <rect x="204" y="47" width="20" height="17" rx="2"/>
      <rect x="231" y="47" width="20" height="17" rx="2"/>
      <rect x="258" y="47" width="20" height="17" rx="2"/>
      <rect x="285" y="47" width="20" height="17" rx="2"/>
      <rect x="312" y="47" width="20" height="17" rx="2"/>
    </g>
    <text x="175" y="110" font-size="12" fill="#d4a017" font-family="Arial" text-anchor="middle" letter-spacing="3">DIATONIC</text>
  </g>

  <!-- Harmonica 2 - larger chromatic below -->
  <g transform="translate(80, 320)">
    <rect x="0" y="0" width="420" height="22" rx="5" fill="#7eb8d4"/>
    <rect x="0" y="22" width="420" height="60" fill="url(#chrome)"/>
    <rect x="0" y="82" width="420" height="22" rx="5" fill="#7eb8d4"/>
    <g fill="#1a1a1a" opacity="0.9">
      <rect x="10" y="30" width="22" height="18" rx="2"/>
      <rect x="38" y="30" width="22" height="18" rx="2"/>
      <rect x="66" y="30" width="22" height="18" rx="2"/>
      <rect x="94" y="30" width="22" height="18" rx="2"/>
      <rect x="122" y="30" width="22" height="18" rx="2"/>
      <rect x="150" y="30" width="22" height="18" rx="2"/>
      <rect x="178" y="30" width="22" height="18" rx="2"/>
      <rect x="206" y="30" width="22" height="18" rx="2"/>
      <rect x="234" y="30" width="22" height="18" rx="2"/>
      <rect x="262" y="30" width="22" height="18" rx="2"/>
      <rect x="290" y="30" width="22" height="18" rx="2"/>
      <rect x="318" y="30" width="22" height="18" rx="2"/>
      <rect x="346" y="30" width="22" height="18" rx="2"/>
      <rect x="374" y="30" width="22" height="18" rx="2"/>
    </g>
    <g fill="#1a1a1a" opacity="0.9">
      <rect x="10" y="52" width="22" height="24" rx="2"/>
      <rect x="38" y="52" width="22" height="24" rx="2"/>
      <rect x="66" y="52" width="22" height="24" rx="2"/>
      <rect x="94" y="52" width="22" height="24" rx="2"/>
      <rect x="122" y="52" width="22" height="24" rx="2"/>
      <rect x="150" y="52" width="22" height="24" rx="2"/>
      <rect x="178" y="52" width="22" height="24" rx="2"/>
      <rect x="206" y="52" width="22" height="24" rx="2"/>
      <rect x="234" y="52" width="22" height="24" rx="2"/>
      <rect x="262" y="52" width="22" height="24" rx="2"/>
      <rect x="290" y="52" width="22" height="24" rx="2"/>
      <rect x="318" y="52" width="22" height="24" rx="2"/>
      <rect x="346" y="52" width="22" height="24" rx="2"/>
      <rect x="374" y="52" width="22" height="24" rx="2"/>
    </g>
    <!-- Slide button -->
    <rect x="400" y="30" width="15" height="44" rx="4" fill="#888" stroke="#555" stroke-width="1"/>
    <text x="210" y="125" font-size="12" fill="#7eb8d4" font-family="Arial" text-anchor="middle" letter-spacing="3">CHROMATIC</text>
  </g>

  <!-- Right side decorative elements -->
  <text x="620" y="200" font-size="120" fill="#d4a017" opacity="0.08" font-family="serif">♪</text>
  <text x="680" y="360" font-size="80" fill="#7eb8d4" opacity="0.1" font-family="serif">♫</text>

  <!-- Title -->
  <text x="680" y="270" font-size="28" fill="white" font-family="Georgia, serif" text-anchor="middle" opacity="0.9">Our Story</text>
  <text x="680" y="305" font-size="14" fill="#7eb8d4" font-family="Arial" text-anchor="middle" letter-spacing="2">Est. 1998</text>
  <line x1="590" y1="315" x2="770" y2="315" stroke="#d4a017" stroke-width="2" opacity="0.6"/>
</svg>
